name: Build Aurora RPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PSDK_RELEASE: "5.2.1"
  PSDK_BUILD: "5.2.1.200"

jobs:
  build-rpm:
    name: Build and verify ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [armv7hl, aarch64]
    env:
      # Каждая архитектура собирается на отдельном чистом runner/workspace.
      # Это запрещает повторное использование object-файлов другой архитектуры.
      TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Platform SDK tarballs
        uses: actions/cache@v4
        with:
          path: ~/AuroraPlatformSDK/tarballs
          key: psdk-tarballs-${{ env.PSDK_BUILD }}-${{ matrix.arch }}
          restore-keys: |
            psdk-tarballs-${{ env.PSDK_BUILD }}-${{ matrix.arch }}
            psdk-tarballs-${{ env.PSDK_BUILD }}-

      - name: Install Aurora Platform SDK
        run: ./ci/install-psdk.sh

      - name: Build, sign and verify RPM
        run: ./ci/build-rpm.sh

      - name: Upload verified RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rutokentestapp-${{ matrix.arch }}-rpm
          path: RPMS/*.${{ matrix.arch }}.rpm
          if-no-files-found: error

  publish-release:
    name: Publish verified RPM pair
    if: github.ref == 'refs/heads/main'
    needs: build-rpm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rutokentestapp-*-rpm
          path: RPMS
          merge-multiple: true

      - name: Require exactly one RPM per architecture
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          arm=(RPMS/*.armv7hl.rpm)
          a64=(RPMS/*.aarch64.rpm)
          all=(RPMS/*.rpm)
          [[ ${#arm[@]} -eq 1 ]]
          [[ ${#a64[@]} -eq 1 ]]
          [[ ${#all[@]} -eq 2 ]]
          sha256sum "${all[@]}"

      - name: Update rolling release ci-latest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view ci-latest >/dev/null 2>&1; then
            gh release create ci-latest --prerelease \
              --title "Последняя CI-сборка (main)" \
              --notes "placeholder"
          fi
          mapfile -t assets < <(gh release view ci-latest --json assets -q '.assets[].name')
          for asset in "${assets[@]}"; do
            gh release delete-asset ci-latest "$asset" -y
          done
          gh release upload ci-latest RPMS/*.rpm --clobber
          gh release edit ci-latest --prerelease \
            --title "Последняя CI-сборка (main)" \
            --notes "Проверенные RPM для ОС Аврора 5.x, подписаны тестовым ключом OMP; собраны независимо по архитектурам из коммита ${GITHUB_SHA} ($(date -u '+%Y-%m-%d %H:%M UTC')). 32-битный телефон — *.armv7hl.rpm, 64-битный — *.aarch64.rpm. Установка: включить режим разработчика, разрешить недоверенное ПО, скачать .rpm и открыть в Файлах."
