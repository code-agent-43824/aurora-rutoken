name: Build Aurora RPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PSDK_RELEASE: "5.2.1"
  PSDK_BUILD: "5.2.1.200"

jobs:
  build-rpm:
    name: Build and verify ${{ matrix.arch }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [armv7hl, aarch64]
    env:
      # Каждая архитектура собирается на отдельном чистом runner/workspace.
      # Это запрещает повторное использование object-файлов другой архитектуры.
      TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Platform SDK tarballs
        uses: actions/cache@v4
        with:
          path: ~/AuroraPlatformSDK/tarballs
          key: psdk-tarballs-${{ env.PSDK_BUILD }}-${{ matrix.arch }}
          restore-keys: |
            psdk-tarballs-${{ env.PSDK_BUILD }}-${{ matrix.arch }}
            psdk-tarballs-${{ env.PSDK_BUILD }}-

      - name: Install Aurora Platform SDK
        run: ./ci/install-psdk.sh

      - name: Build, sign and verify RPM
        run: ./ci/build-rpm.sh

      - name: Download and verify official Rutoken PKCS#11 RPM
        run: ./ci/fetch-rutoken-pkcs11.sh

      - name: Read package version for artifact name
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk '$1 == "Version:" { print $2; exit }' rpm/*.spec)
          release=$(awk '$1 == "Release:" { print $2; exit }' rpm/*.spec)
          [[ -n "$version" && -n "$release" ]]
          echo "version_release=${version}-${release}" >> "$GITHUB_OUTPUT"

      - name: Upload versioned verified RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rutokentestapp-${{ steps.package.outputs.version_release }}-${{ matrix.arch }}-rpms
          path: RPMS/*.${{ matrix.arch }}.rpm
          if-no-files-found: error

  publish-release:
    name: Publish verified RPM pair
    if: github.ref == 'refs/heads/main'
    needs: build-rpm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified RPM artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rutokentestapp-*-rpms
          path: RPMS
          merge-multiple: true

      - name: Require one application and one official dependency RPM per architecture
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          app_arm=(RPMS/ru.codeagent43824.rutokentestapp-*.armv7hl.rpm)
          app_a64=(RPMS/ru.codeagent43824.rutokentestapp-*.aarch64.rpm)
          lib_arm=(RPMS/ru.rutoken.librtpkcs11ecp-*.armv7hl.rpm)
          lib_a64=(RPMS/ru.rutoken.librtpkcs11ecp-*.aarch64.rpm)
          all=(RPMS/*.rpm)
          [[ ${#app_arm[@]} -eq 1 ]]
          [[ ${#app_a64[@]} -eq 1 ]]
          [[ ${#lib_arm[@]} -eq 1 ]]
          [[ ${#lib_a64[@]} -eq 1 ]]
          [[ ${#all[@]} -eq 4 ]]
          sha256sum "${all[@]}"

      - name: Update rolling release ci-latest
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view ci-latest >/dev/null 2>&1; then
            gh release create ci-latest --prerelease \
              --title "Последняя CI-сборка (main)" \
              --notes "placeholder"
          fi
          mapfile -t assets < <(gh release view ci-latest --json assets -q '.assets[].name')
          for asset in "${assets[@]}"; do
            gh release delete-asset ci-latest "$asset" -y
          done
          gh release upload ci-latest RPMS/*.rpm --clobber
          gh release edit ci-latest --prerelease \
            --title "Последняя CI-сборка (main)" \
            --notes "Проверенные RPM для ОС Аврора 5.x из коммита ${GITHUB_SHA} ($(date -u '+%Y-%m-%d %H:%M UTC')). Для своей архитектуры сначала установите неизменённый официальный ru.rutoken.librtpkcs11ecp-2.19.0.0-1 RPM, затем ru.codeagent43824.rutokentestapp. 32-битный телефон — *.armv7hl.rpm, 64-битный — *.aarch64.rpm. Приложение подписано тестовым ключом OMP; нужен режим разработчика и разрешение недоверенного ПО. Лицензия Рутокен: https://www.rutoken.ru/download/license/License_Agreement_Rutoken.pdf"
