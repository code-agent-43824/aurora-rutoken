name: Build Aurora RPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PSDK_RELEASE: "5.2.1"
  PSDK_BUILD: "5.2.1.200"
  # armv7hl — 32-битные устройства (телефон владельца), aarch64 — 64-битные.
  TARGET_ARCHS: "armv7hl aarch64"

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Platform SDK tarballs
        uses: actions/cache@v4
        with:
          path: ~/AuroraPlatformSDK/tarballs
          key: psdk-tarballs-${{ env.PSDK_BUILD }}-armv7hl+aarch64
          restore-keys: |
            psdk-tarballs-${{ env.PSDK_BUILD }}-

      - name: Install Aurora Platform SDK
        run: ./ci/install-psdk.sh

      - name: Build RPM
        run: ./ci/build-rpm.sh

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rutokentestapp-rpms
          path: RPMS/*.rpm
          if-no-files-found: error

      - name: Update rolling release ci-latest
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view ci-latest >/dev/null 2>&1; then
            gh release create ci-latest --prerelease \
              --title "Последняя CI-сборка (main)" \
              --notes "placeholder"
          fi
          gh release upload ci-latest RPMS/*.rpm --clobber
          gh release edit ci-latest --prerelease \
            --title "Последняя CI-сборка (main)" \
            --notes "RPM для ОС Аврора 5.x, подписаны тестовым ключом OMP; собраны автоматически из коммита ${GITHUB_SHA} ($(date -u '+%Y-%m-%d %H:%M UTC')). Какой файл качать: 32-битный телефон — *.armv7hl.rpm, 64-битный — *.aarch64.rpm. Установка: включите режим разработчика, разрешите недоверенное ПО, скачайте .rpm и откройте в Файлах."
